<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a; /* Dark sleek background */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 2px solid #38bdf8;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            background-color: #1e293b;
            color: #f8fafc;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #334155;
            transition: all 0.2s ease-in-out;
        }

        .link-btn:hover {
            background-color: #38bdf8;
            color: #0f172a;
            transform: translateY(-2px);
            border-color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture (Placeholder - you can change this URL later) -->
        <img class="profile-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" alt="Profile Picture">
        
        <h1>Your Name / Brand</h1>
        <p class="bio">Welcome to my page! Check out my projects and social links below.</p>

        <div class="links-wrapper">
            <!-- Edit these links with your own titles and URLs -->
            <a href="https://yourportfolio.com" class="link-btn" target="_blank">🌐 My Portfolio</a>
            <a href="https://linkedin.com/in/yourprofile" class="link-btn" target="_blank">💼 LinkedIn</a>
            <a href="https://github.com/yourusername" class="link-btn" target="_blank">💻 GitHub Profile</a>
            <a href="https://youtube.com" class="link-btn" target="_blank">📺 YouTube Channel</a>
        </div>
    </div>

</body>
</html>
