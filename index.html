<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunivi | Explore Links</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Animated gradient background mesh */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Profile Area with Premium Glow */
        .profile-card {
            margin-bottom: 35px;
        }

        .profile-img-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 16px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Subtle animated breathing glow ring around profile */
        .profile-img-container::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, #38bdf8, #818cf8, #c084fc);
            z-index: -1;
            opacity: 0.8;
            animation: rotateGlow 6s linear infinite;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .verified-badge {
            color: #38bdf8;
            font-size: 1.1rem;
            margin-left: 4px;
            vertical-align: middle;
        }

        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            max-width: 85%;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* Social Icons Row */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-icon-btn {
            color: #94a3b8;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .social-icon-btn:hover {
            color: #38bdf8;
            transform: translateY(-3px);
        }

        /* Links Section (Glassmorphism layout) */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f1f5f9;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .link-btn i.button-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: left;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            margin-right: -24px; /* Perfectly centers text despite left icon */
        }

        .link-btn i.arrow-icon {
            font-size: 0.85rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        /* Hover Interactions */
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.15);
            transform: translateY(-3px);
            color: #38bdf8;
        }

        .link-btn:hover i.arrow-icon {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Profile Header Section -->
        <div class="profile-card">
            <div class="profile-img-container">
                <!-- Replace URL below with your actual profile image link later -->
                <img class="profile-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200" alt="Profile Picture">
            </div>
            <h1>Thunivi<i class="fas fa-circle-check verified-badge"></i></h1>
            <p class="bio">Digital Creator & Developer. Building premium interactive web experiences.</p>
        </div>

        <!-- Social Media Header Quick Links -->
        <div class="social-icons">
            <a href="https://instagram.com" class="social-icon-btn" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com" class="social-icon-btn" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://github.com" class="social-icon-btn" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:your-email@gmail.com" class="social-icon-btn"><i class="fas fa-envelope"></i></a>
        </div>

        <!-- Glassmorphism Buttons Container -->
        <div class="links-wrapper">
            <a href="https://yourportfolio.com" class="link-btn" target="_blank">
                <i class="fas fa-globe button-icon"></i>
                <span class="link-text">Visit My Portfolio</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
            
            <a href="https://linkedin.com" class="link-btn" target="_blank">
                <i class="fab fa-linkedin button-icon"></i>
                <span class="link-text">Connect on LinkedIn</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
            
            <a href="https://youtube.com" class="link-btn" target="_blank">
                <i class="fab fa-youtube button-icon"></i>
                <span class="link-text">Watch YouTube Content</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://whatsapp.com" class="link-btn" target="_blank">
                <i class="fab fa-whatsapp button-icon"></i>
                <span class="link-text">Chat on WhatsApp</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
        </div>
    </div>

</body>
</html>
