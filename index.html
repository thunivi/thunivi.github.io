<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Layer 1: Instant HTML Meta Redirect -->
    <meta http-equiv="refresh" content="0; url=https://thunivi.in/bio">
    
    <script>
        <!-- Layer 2: JavaScript Backup Redirect -->
        window.location.href = "https://thunivi.in/bio";
    </script>
</head>
<body>
    <!-- Fallback link in the rare case a browser blocks redirects -->
    <p style="text-align: center; margin-top: 50px; font-family: sans-serif; color: #333;">
        Redirecting you to our bio page... If it doesn't load, <a href="https://thunivi.in/bio">click here</a>.
    </p>
</body>
</html>
